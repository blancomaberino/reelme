<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reelmap — demo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root { --bg:#0e0f13; --panel:#171922; --line:#262a37; --fg:#e7e9ee; --mut:#9aa0ae; --acc:#ff5a5f; --ok:#39d98a; --warn:#ffcf5c; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  #app { display:grid; grid-template-columns:360px 1fr; height:100%; }
  #side { border-right:1px solid var(--line); overflow-y:auto; padding:18px; background:var(--panel); }
  #map { height:100%; }
  h1 { font-size:18px; margin:0 0 2px; letter-spacing:-0.02em; }
  h1 span { color:var(--acc); }
  .sub { color:var(--mut); font-size:12px; margin-bottom:18px; }
  .card { border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:14px; background:#12141c; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--mut); margin:0 0 10px; }
  label { display:block; font-size:12px; color:var(--mut); margin:8px 0 4px; }
  input, button { width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:#0d0f16; color:var(--fg); font-size:13px; }
  button { background:var(--acc); border-color:var(--acc); color:#fff; font-weight:600; cursor:pointer; margin-top:12px; }
  button.ghost { background:transparent; border-color:var(--line); color:var(--fg); font-weight:500; }
  button:disabled { opacity:.5; cursor:default; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--mut); }
  .pill.published { color:var(--ok); border-color:#1e5c40; }
  .pill.review { color:var(--warn); border-color:#5c4d1e; }
  .pill.failed { color:var(--acc); border-color:#5c2222; }
  .share { border-top:1px solid var(--line); padding:10px 0; font-size:13px; }
  .share:first-child { border-top:0; }
  .share .u { color:var(--mut); font-size:11px; word-break:break-all; }
  .muted { color:var(--mut); font-size:12px; }
  .err { color:var(--acc); font-size:12px; margin-top:8px; min-height:16px; }
  .hidden { display:none; }
  #detail { position:absolute; top:0; right:0; width:360px; height:100%; background:var(--panel);
    border-left:1px solid var(--line); overflow-y:auto; padding:18px 20px; z-index:1200; display:none; }
  #detail.open { display:block; }
  #detail .close { float:right; cursor:pointer; color:var(--mut); font-size:16px; }
  #detail h2 { margin:0 0 2px; font-size:19px; letter-spacing:-0.02em; }
  #detail h3 { font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--mut); margin:14px 0 6px; }
  .stars { color:var(--warn); letter-spacing:1px; }
  #detail .chip { display:inline-block; font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); margin:2px 4px 2px 0; color:var(--fg); }
  .rev, .src { border-top:1px solid var(--line); padding:9px 0; font-size:12px; }
  .src a { color:var(--acc); text-decoration:none; }
  .revform { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:8px; }
  .revform select, .revform input { background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:12px; }
  .revform input { flex:1; min-width:120px; }
  .revform button { font-size:12px; padding:7px 12px; }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>Reel<span>map</span></h1>
    <div class="sub">Share a link → we extract the place → it lands on the map.</div>

    <div class="card" id="searchCard">
      <h2>Search</h2>
      <input id="searchBox" type="search" placeholder="Search places, tags, accounts…" autocomplete="off">
      <div id="searchResults"></div>
    </div>

    <div class="card" id="feedCard">
      <h2>Feed</h2>
      <div id="feed"><div class="muted">Loading…</div></div>
    </div>

    <div class="card" id="authCard">
      <h2>1 · Sign in</h2>
      <div class="row">
        <input id="email" type="email" placeholder="email" autocomplete="username">
        <input id="password" type="password" placeholder="password" autocomplete="current-password">
      </div>
      <div class="row">
        <button id="loginBtn" class="ghost">Log in</button>
        <button id="registerBtn">Register</button>
      </div>
      <div class="err" id="authErr"></div>
    </div>

    <div class="card hidden" id="whoCard">
      <h2>Signed in</h2>
      <div class="muted" id="whoLine"></div>
      <button id="logoutBtn" class="ghost">Log out</button>
    </div>

    <div class="card hidden" id="submitCard">
      <h2>2 · Share a link</h2>
      <label>Post URL — real YouTube / TikTok links are fetched via oEmbed</label>
      <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=… or a TikTok link">
      <label>…or a caption / description (also used when a post can't be fetched)</label>
      <input id="caption" type="text" placeholder="Best tacos in Lisbon — Time Out Market">
      <button id="submitBtn">Submit</button>
      <div class="err" id="submitErr"></div>
    </div>

    <div class="card hidden" id="sharesCard">
      <h2>3 · Your shares</h2>
      <div id="shares"><div class="muted">None yet.</div></div>
    </div>
  </aside>
  <div id="map"></div>
  <div id="detail"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────
// Served from the same Laravel origin, so the API base is relative.
const API = "/api/v1";
let token = localStorage.getItem("reelmap_token") || null;
let pollTimer = null;
const markers = L.layerGroup();

// ── Map ───────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl:true }).setView([38.72, -9.14], 12); // Lisbon
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:20,
}).addTo(map);
markers.addTo(map);
map.on("moveend", loadPlaces);

async function api(path, opts = {}) {
  const headers = { "Accept":"application/json", "Content-Type":"application/json", ...(opts.headers||{}) };
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, { ...opts, headers });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(body?.error?.message || res.statusText), { body, status: res.status });
  return body;
}

// ── Search (T-031): federated places/tags/influencers ──────────────────────
let searchTimer = null, searchSeq = 0;
document.getElementById("searchBox").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { searchSeq++; document.getElementById("searchResults").innerHTML = ""; return; }
  searchTimer = setTimeout(() => runSearch(q), 250);
});

async function runSearch(q) {
  const seq = ++searchSeq; // drop out-of-order responses
  const out = document.getElementById("searchResults");
  try {
    const { data } = await api(`/search?q=${encodeURIComponent(q)}`);
    if (seq !== searchSeq) return;
    const places = (data.places || []).map(p =>
      `<div class="src"><a href="#" onclick="goToPlace(${Number(p.id)}, ${Number(p.lat)}, ${Number(p.lng)}); return false;">📍 ${esc(p.name)}</a>` +
      `${p.city ? ` <span class="muted">· ${esc(p.city)}</span>` : ""}</div>`).join("");
    const tags = (data.tags || []).map(t => `<span class="chip">#${esc(t.slug)}</span>`).join("");
    const infl = (data.influencers || []).map(i => `<div class="src muted">🎥 @${esc(i.handle)}</div>`).join("");
    out.innerHTML = (places + tags + infl) || '<div class="muted">No matches.</div>';
  } catch (err) {
    if (seq !== searchSeq) return;
    out.innerHTML = `<div class="err">${esc(err.message)}</div>`;
  }
}

function goToPlace(id, lat, lng) {
  map.flyTo([lat, lng], 17, { duration: 0.8 });
  showPlace(id);
}

// ── Feed (T-034): recent published shares ───────────────────────────────────
async function loadFeed() {
  const el = document.getElementById("feed");
  try {
    const { data } = await api('/feed?limit=8');
    if (!data.length) { el.innerHTML = '<div class="muted">Nothing shared yet.</div>'; return; }
    el.innerHTML = data.map(item => {
      const place = item.place || {};
      const who = item.sharer ? esc(item.sharer.username) : "someone";
      const via = item.influencer ? ` · @${esc(item.influencer.handle)}` : "";
      const when = item.published_at ? new Date(item.published_at).toLocaleDateString() : "";
      return `<div class="src">📣 <a href="#" onclick="goToPlace(${Number(place.id)}, ${Number(place.lat)}, ${Number(place.lng)}); return false;">${esc(place.name || "a place")}</a>` +
        `<br><span class="muted">${who}${via} · ${esc(when)}</span></div>`;
    }).join("");
  } catch (err) {
    el.innerHTML = `<div class="err">${esc(err.message)}</div>`;
  }
}
loadFeed();

// ── Map: load places in the current viewport ───────────────────────────────
async function loadPlaces() {
  const b = map.getBounds();
  const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].map(n => n.toFixed(6)).join(",");
  try {
    const { data } = await api(`/map/places?bbox=${bbox}&zoom=${Math.round(map.getZoom())}`);
    markers.clearLayers();
    for (const p of (data.pins || [])) {
      L.marker([p.lat, p.lng]).addTo(markers)
        .bindTooltip(esc(p.name))
        .on("click", () => showPlace(p.id));
    }
    for (const c of (data.clusters || [])) {
      L.marker([c.lat, c.lng], { icon: clusterIcon(c.count) }).addTo(markers)
        .bindTooltip(`${c.count} places`)
        .on("click", () => { const b = c.expand?.bbox; if (b) map.fitBounds([[b[1],b[0]],[b[3],b[2]]]); });
    }
  } catch (e) { /* map stays as-is on transient errors */ }
}

function clusterIcon(count) {
  return L.divIcon({ className:"", html:`<div style="background:#ff5a5f;color:#fff;border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid #fff">${count}</div>`, iconSize:[34,34] });
}
const esc = s => String(s??"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const safeUrl = u => /^https?:\/\//i.test(u||"") ? u : "#";   // block javascript:/data: in hrefs
const money = n => n ? "$".repeat(n) : "";
const starStr = v => { if (v == null) return ""; const n = Math.max(0, Math.min(5, Math.round(v))); return "★".repeat(n) + "☆".repeat(5 - n); };

// ── Place detail panel (click a pin) ────────────────────────────────────────
async function showPlace(id) {
  const el = document.getElementById("detail");
  el.classList.add("open");
  el.innerHTML = '<span class="close" onclick="closeDetail()">✕</span><div class="muted">Loading…</div>';
  try {
    const { data: p } = await api(`/places/${id}?include=sources,reviews`);
    el.innerHTML = renderPlace(p);
  } catch (e) {
    el.innerHTML = `<span class="close" onclick="closeDetail()">✕</span><div class="err">${esc(e.message)}</div>`;
  }
}
function closeDetail() { document.getElementById("detail").classList.remove("open"); }

function renderPlace(p) {
  const g = (p.rating && p.rating.google) || {}, a = (p.rating && p.rating.app) || {};
  const chips = arr => (arr || []).map(t => `<span class="chip">${esc(t)}</span>`).join("");
  const gLine = g.value != null ? `<span class="stars">${starStr(g.value)}</span> ${g.value} · ${g.count} on Google` : "";
  const aLine = a.count ? `<div><span class="stars">${starStr(a.value)}</span> ${a.value} · ${a.count} in-app</div>` : "";
  const dishes = (p.dishes || []).map(d => `<span class="chip">${esc(d.name)}${d.shown_in_video ? " 🎬" : ""}</span>`).join("");
  const tags = chips(p.cuisines) + chips(p.vibe_tags) + chips(p.dietary_tags);
  const sources = (p.sources || []).map(s => {
    const post = s.source_post || {};
    const handle = s.influencer && s.influencer.handle;
    const sharer = s.sharer && s.sharer.username;
    const label = `${esc(post.platform || "")} post`.trim();
    const link = post.url
      ? `<a href="${esc(safeUrl(post.url))}" target="_blank" rel="noopener">${label}</a>`
      : label;
    return `<div class="src">🔗 ${link}` +
      `${handle ? ` · @${esc(handle)}` : ""}${sharer ? ` · shared by ${esc(sharer)}` : ""}</div>`;
  }).join("");
  const reviews = (p.google_reviews || []).slice(0, 3).map(r =>
    `<div class="rev"><span class="stars">${starStr(r.rating)}</span> <b>${esc(r.author || "")}</b>` +
    `<br>${esc((r.text || "").slice(0, 220))}</div>`).join("");
  const appReviews = (p.reviews || []).map(r =>
    `<div class="rev"><span class="stars">${starStr(r.rating)}</span> <b>${esc(r.author ? r.author.username : "anonymous")}</b>` +
    `${r.is_own ? ' <span class="muted">(you)</span>' : ""}` +
    `${r.body ? `<br>${esc(r.body.slice(0, 220))}` : ""}</div>`).join("");
  const own = (p.reviews || []).find(r => r.is_own);
  const reviewForm = token ? `
    <div class="revform">
      <select id="revRating">${[5,4,3,2,1].map(n =>
        `<option value="${n}"${own && own.rating === n ? " selected" : ""}>${"★".repeat(n)}</option>`).join("")}</select>
      <input id="revBody" type="text" placeholder="Say something (optional)" value="${own && own.body ? esc(own.body) : ""}">
      <button onclick="submitReview(${Number(p.id)})">${own ? "Update" : "Review"}</button>
      ${own ? `<button class="ghost" onclick="deleteReview(${Number(p.id)})">Delete</button>` : ""}
      <div class="err" id="revErr"></div>
    </div>` : '<div class="muted">Log in to leave a review.</div>';
  return `<span class="close" onclick="closeDetail()">✕</span>
    <h2>${esc(p.name)}</h2>
    <div class="muted">${esc([p.category, p.city, p.country_code].filter(Boolean).join(" · "))} ${money(p.price_range)}</div>
    <div style="margin:8px 0">${gLine}${aLine}</div>
    ${tags ? `<h3>Tags</h3>${tags}` : ""}
    ${dishes ? `<h3>Dishes seen</h3>${dishes}` : ""}
    ${sources ? `<h3>Shared in (${p.source_count})</h3>${sources}` : ""}
    <h3>Reviews</h3>${appReviews || '<div class="muted">No reviews yet — be the first.</div>'}${reviewForm}
    ${reviews ? `<h3>Google reviews</h3>${reviews}` : ""}`;
}

async function submitReview(placeId) {
  const rating = Number(document.getElementById("revRating").value);
  const body = document.getElementById("revBody").value.trim();
  try {
    await api(`/places/${placeId}/reviews`, {
      method: "PUT",
      body: JSON.stringify({ rating, body: body || null }),
    });
    showPlace(placeId); // re-render with the fresh aggregate
  } catch (e) {
    document.getElementById("revErr").textContent = e.message;
  }
}

async function deleteReview(placeId) {
  try {
    await api(`/places/${placeId}/reviews`, { method: "DELETE" });
    showPlace(placeId);
  } catch (e) {
    document.getElementById("revErr").textContent = e.message;
  }
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function auth(kind) {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  document.getElementById("authErr").textContent = "";
  if (kind === "register" && password.length < 8) {
    document.getElementById("authErr").textContent = "Password must be at least 8 characters.";
    return;
  }
  try {
    // Register needs a unique handle: derive one from the email + a random suffix.
    const stem = (email.split("@")[0] || "user").replace(/[^a-zA-Z0-9_]/g, "").slice(0, 20) || "user";
    const username = (stem.length >= 3 ? stem : "user") + "_" + Math.random().toString(36).slice(2, 7);
    const payload = kind === "register"
      ? { name: stem, username, email, password, device_name: "web-demo" }
      : { email, password, device_name: "web-demo" };
    const body = await api(`/auth/${kind}`, { method:"POST", body: JSON.stringify(payload) });
    token = body?.data?.token || body?.token;
    if (!token) throw new Error("No token in response");
    localStorage.setItem("reelmap_token", token);
    await afterAuth();
  } catch (e) {
    // Surface field-level validation details, not just the summary.
    const details = e.body?.error?.details;
    const first = details && Object.values(details)[0]?.[0];
    document.getElementById("authErr").textContent = first || e.message;
  }
}

async function afterAuth() {
  try {
    const me = await api("/me");
    const u = me?.data?.user || me?.data || me;
    document.getElementById("whoLine").textContent = u?.email || "signed in";
  } catch { /* token may be stale */ token = null; localStorage.removeItem("reelmap_token"); }
  const on = !!token;
  document.getElementById("authCard").classList.toggle("hidden", on);
  ["whoCard","submitCard","sharesCard"].forEach(id => document.getElementById(id).classList.toggle("hidden", !on));
  if (on) { refreshShares(); loadPlaces(); }
}

// Fly the map to the newest published place (which can be anywhere in the world)
// so the pin is visible without panning — using the place coords the /shares
// response now carries, rather than a globe-sized map query.
let lastFocusedShareId = null;
function focusPublished(shares) {
  const published = shares.find(s => s.status === "published" && s.place);
  if (!published) return;
  loadPlaces();
  if (published.id !== lastFocusedShareId) {
    lastFocusedShareId = published.id;
    map.setView([published.place.lat, published.place.lng], 15);
  }
}

function logout() { token = null; localStorage.removeItem("reelmap_token"); lastFocusedShareId = null; clearInterval(pollTimer); afterAuth(); }

// ── Submit a share ─────────────────────────────────────────────────────────
async function submitShare() {
  const url = document.getElementById("url").value.trim();
  const caption = document.getElementById("caption").value.trim();
  const btn = document.getElementById("submitBtn");
  document.getElementById("submitErr").textContent = "";
  if (!url && !caption) { document.getElementById("submitErr").textContent = "Enter a URL or a caption."; return; }
  btn.disabled = true; btn.textContent = "Submitting…";
  try {
    // The caption is the content the pipeline extracts from (platform posts
    // can't be fetched locally); the url is kept only as a reference.
    await api("/shares", { method:"POST", body: JSON.stringify({ url: url || undefined, caption: caption || undefined }) });
    document.getElementById("url").value = ""; document.getElementById("caption").value = "";
    startPolling();
  } catch (e) { document.getElementById("submitErr").textContent = e.body?.error?.message || e.message; }
  finally { btn.disabled = false; btn.textContent = "Submit"; }
}

// ── Shares list + polling ──────────────────────────────────────────────────
async function refreshShares() {
  try {
    const { data } = await api("/shares?limit=10");
    const el = document.getElementById("shares");
    if (!data.length) { el.innerHTML = '<div class="muted">None yet.</div>'; return; }
    el.innerHTML = data.map(s => {
      const st = s.status;
      const place = s.place ? `<br>📍 ${esc(s.place.name)}` : "";
      return `<div class="share"><span class="pill ${esc(st)}">${esc(st)}</span> <span class="u">${esc(s.url||s.source_post?.url||"manual")}</span>${place}</div>`;
    }).join("");
    // When something publishes, fly the map to its place so the new pin shows.
    focusPublished(data);
    // Stop polling once nothing is in-flight.
    const inflight = data.some(s => ["pending","fetching","analyzing"].includes(s.status));
    if (!inflight && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } catch { /* keep last render */ }
}

function startPolling() {
  refreshShares();
  clearInterval(pollTimer);
  pollTimer = setInterval(refreshShares, 2500);
}

// ── Wire up ────────────────────────────────────────────────────────────────
document.getElementById("loginBtn").onclick = () => auth("login");
document.getElementById("registerBtn").onclick = () => auth("register");
document.getElementById("logoutBtn").onclick = logout;
document.getElementById("submitBtn").onclick = submitShare;
afterAuth();
</script>
</body>
</html>
