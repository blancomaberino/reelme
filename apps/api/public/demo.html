<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reelmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   REELMAP · Art direction "MERCADO"
   Warm Lisbon-market paper, terracotta primary, azulejo teal secondary,
   market-gold for price/reviews. Georgia serif for names, system sans for UI.
   Token block lifted from design/reelmap-design-v1 (claude.ai/design).
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  --bg:#F6F0E6; --bg-map:#ECE4D6; --surface:#FFFFFF; --surface-2:#F4EDE1;
  --ink:#241E17; --ink-2:#5E5347; --muted:#938776; --line:#E6DBC8; --line-2:#D8CBB4;
  --primary:#CF5C34; --primary-ink:#FFFFFF; --primary-soft:#F7E1D5;
  --secondary:#356E86; --secondary-soft:#DBE8EC;
  --gold:#B4842A; --gold-soft:#F1E6C9; --green:#4C8759; --green-soft:#DCEBDD;
  --danger:#BC4329; --danger-soft:#F6DCD3;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px; --r-pill:999px;
  --sh-1:0 1px 2px rgba(40,26,12,.06), 0 2px 6px rgba(40,26,12,.07);
  --sh-2:0 8px 20px rgba(40,26,12,.13);
  --sh-3:0 22px 54px rgba(40,26,12,.24);
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px; --s8:48px;
  --font-display:Georgia,'Iowan Old Style','Times New Roman',serif;
  --font-ui:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --fs-3xl:34px; --fs-2xl:26px; --fs-xl:21px; --fs-lg:18px;
  --fs-md:15px; --fs-sm:13px; --fs-xs:11px;
}
[data-theme="dark"]{
  --bg:#151109; --bg-map:#1C1710; --surface:#241D14; --surface-2:#2C2418;
  --ink:#F3EADA; --ink-2:#C6B9A5; --muted:#8E8272; --line:#332A1C; --line-2:#41361F;
  --primary:#E07A50; --primary-ink:#1A1206; --primary-soft:#3A2517;
  --secondary:#6FA6BE; --secondary-soft:#1E2E36;
  --gold:#D2A24A; --gold-soft:#33290F; --green:#6FB27C; --green-soft:#1E2C1F;
  --danger:#E06A50; --danger-soft:#3A1C14;
  --sh-1:0 1px 2px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.4);
  --sh-2:0 8px 20px rgba(0,0,0,.5);
  --sh-3:0 22px 54px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);font-size:var(--fs-md);-webkit-font-smoothing:antialiased;}
a{color:var(--secondary);text-decoration:none;}
a:hover{color:var(--primary);text-decoration:underline;text-underline-offset:2px;}
button{font-family:inherit;cursor:pointer;}
*:focus-visible{outline:2.5px solid var(--secondary);outline-offset:2px;border-radius:4px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;border:2px solid transparent;background-clip:padding-box;}
@keyframes rm-shimmer{0%{background-position:-460px 0;}100%{background-position:460px 0;}}
@keyframes rm-pulse{0%,100%{transform:scale(1);opacity:.55;}50%{transform:scale(1.35);opacity:0;}}
@keyframes rm-spin{to{transform:rotate(360deg);}}
@keyframes rm-toast{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ── app shell ── */
#map{position:fixed;inset:0;background:var(--bg-map);z-index:0;}
.serif{font-family:var(--font-display);letter-spacing:-.01em;}
.mono{font-family:var(--font-mono);}

/* ── buttons ── */
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:var(--r-pill);
  padding:10px 16px;font-size:var(--fs-sm);font-weight:600;box-shadow:var(--sh-1);}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--primary);color:var(--primary-ink);border-color:var(--primary);}
.btn-block{width:100%;border-radius:var(--r-sm);padding:12px;justify-content:center;}
.btn:disabled{opacity:.55;cursor:default;}

/* ── floating chrome over the map ── */
.floating{position:fixed;z-index:600;}
#searchWrap{top:var(--s5);left:50%;transform:translateX(-50%);width:min(560px,64vw);display:flex;flex-direction:column;gap:10px;}
.searchbar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:11px 16px;box-shadow:var(--sh-2);}
.searchbar input{flex:1;border:none;background:none;font-size:var(--fs-md);color:var(--ink);font-family:inherit;outline:none;}
.searchbar input::placeholder{color:var(--muted);}
.mag{width:16px;height:16px;border:2px solid var(--muted);border-radius:50%;position:relative;flex:none;}
.mag::after{content:"";position:absolute;width:2px;height:7px;background:var(--muted);right:-3px;bottom:-4px;transform:rotate(-45deg);}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip-f{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:7px 14px;font-size:var(--fs-sm);box-shadow:var(--sh-1);font-weight:500;user-select:none;}
.chip-f.on{background:var(--primary);color:var(--primary-ink);border-color:var(--primary);font-weight:600;}
#searchPanel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2);
  overflow:hidden;max-height:60vh;overflow-y:auto;display:none;}
#searchPanel.open{display:block;}
.sec-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--muted);padding:12px 16px 6px;}
.result{display:flex;gap:12px;align-items:center;padding:9px 16px;cursor:pointer;}
.result:hover{background:var(--surface-2);}
.result .rt{width:38px;height:38px;border-radius:8px;flex:none;background:var(--surface-2);display:grid;place-items:center;color:var(--muted);}
.result .rt.round{border-radius:50%;background:linear-gradient(150deg,#8FB0C6,#356E86);}
.result-name{font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);}
.result-sub{font-size:var(--fs-xs);color:var(--ink-2);}
.tagchip{display:inline-block;background:var(--secondary-soft);color:var(--secondary);border-radius:var(--r-pill);
  padding:6px 12px;font-size:var(--fs-sm);font-weight:600;margin:0 6px 6px 0;cursor:pointer;}

/* ── top-right account cluster ── */
#topRight{top:var(--s5);right:var(--s5);display:flex;align-items:center;gap:10px;}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(150deg,#E8A15C,#C24B2E);flex:none;}
.account{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-pill);padding:5px 12px 5px 5px;box-shadow:var(--sh-1);font-size:var(--fs-sm);font-weight:600;}

/* ── feed rail (desktop) / bottom sheet (mobile) ── */
#feedRail{top:132px;left:var(--s5);bottom:var(--s5);width:326px;display:flex;flex-direction:column;
  background:color-mix(in oklab,var(--surface) 94%,transparent);backdrop-filter:blur(8px);
  border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2);overflow:hidden;}
.rail-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.rail-body{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.switch{display:flex;align-items:center;gap:6px;font-size:var(--fs-xs);color:var(--ink-2);cursor:pointer;user-select:none;}
.switch input{position:absolute;opacity:0;pointer-events:none;}
.track{width:34px;height:20px;border-radius:99px;background:var(--line-2);position:relative;transition:background .15s;}
.track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;}
.switch input:checked + .track{background:var(--primary);}
.switch input:checked + .track::after{left:16px;}

.feed-card{position:relative;display:flex;gap:12px;padding:10px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);cursor:pointer;}
.feed-card:hover{border-color:var(--line-2);}
.feed-hide{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:12px;line-height:1;cursor:pointer;display:grid;place-items:center;opacity:.5;transition:opacity .12s,color .12s;}
.feed-card:hover .feed-hide{opacity:1;}
.feed-hide:hover,.feed-hide:focus-visible{color:var(--danger);border-color:var(--danger);opacity:1;}
.thumb{width:52px;height:70px;border-radius:8px;flex:none;position:relative;overflow:hidden;}
.thumb::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.10) 0 6px,transparent 6px 12px);}
.feed-name{font-family:var(--font-display);font-weight:700;font-size:var(--fs-md);line-height:1.15;}
.feed-meta{font-size:var(--fs-xs);color:var(--ink-2);margin:4px 0 6px;}
.feed-foot{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);}
.rating-chip{background:var(--gold-soft);color:var(--gold);border-radius:6px;padding:2px 6px;font-weight:700;}

/* ── drawer (place detail / profile) ── */
#detail{position:fixed;top:0;right:0;bottom:0;width:min(440px,100vw);background:var(--surface);
  box-shadow:var(--sh-3);z-index:1200;transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;}
#detail.open{transform:none;}
.drawer-scroll{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;flex:1;}
.hero{height:180px;position:relative;flex:none;}
.hero::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.08) 0 8px,transparent 8px 16px);}
.hero .close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.92);
  border:none;font-size:16px;color:#241E17;display:grid;place-items:center;z-index:2;}
.chip{display:inline-block;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:4px 10px;font-size:var(--fs-xs);font-weight:600;margin:0 4px 4px 0;color:var(--ink);}
.chip.gold{color:var(--gold);}
.chip.dish{background:var(--secondary-soft);border-color:transparent;color:var(--secondary);}
.status-pill{display:inline-block;border-radius:var(--r-pill);padding:4px 10px;font-size:var(--fs-xs);font-weight:700;}
.status-pill.open{background:var(--green-soft);color:var(--green);}
.rating-cards{display:flex;gap:10px;}
.rsrc-list{display:flex;flex-direction:column;gap:8px;}
.rsrc{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;}
.rating-card{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:12px;}
.rating-num{font-family:var(--font-display);font-size:var(--fs-2xl);font-weight:700;line-height:1;}
.stars{color:var(--gold);letter-spacing:2px;}
.dim{color:var(--line-2);}
.sec-h{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--muted);}
.source-card{display:flex;gap:10px;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:var(--fs-sm);}
.source-card:first-child{border-top:none;}
.revbox{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;}
.revform{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.revform select,.revform input{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-sm);
  padding:9px 10px;font-size:var(--fs-sm);color:var(--ink);font-family:inherit;}
.revform input{flex:1;min-width:120px;}
.review{display:flex;gap:10px;}
.review .ra{width:32px;height:32px;border-radius:50%;flex:none;background:linear-gradient(150deg,#8FB0C6,#356E86);}
.drawer-foot{border-top:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:10px;background:var(--surface);flex:none;}
.field-label{font-size:var(--fs-xs);font-weight:600;color:var(--ink-2);display:block;}
.field{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--r-sm);
  padding:11px 12px;font-size:var(--fs-sm);color:var(--ink);font-family:inherit;margin:6px 0 14px;}
.field.err{border-color:var(--danger);border-width:1.5px;}

/* ── modals ── */
.backdrop{position:fixed;inset:0;background:rgba(20,12,4,.42);z-index:1400;display:none;align-items:center;justify-content:center;padding:20px;}
.backdrop.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-3);
  padding:24px;width:min(420px,100%);max-height:90vh;overflow-y:auto;animation:rm-toast .25s ease;}
.modal h3{font-family:var(--font-display);font-size:var(--fs-xl);font-weight:700;margin:0 0 4px;}
.modal .sub{font-size:var(--fs-sm);color:var(--ink-2);margin:0 0 18px;}
.modal .x{float:right;background:none;border:none;font-size:18px;color:var(--muted);margin:-6px -6px 0 0;}
.err-line{display:flex;align-items:center;gap:6px;color:var(--danger);font-size:var(--fs-xs);min-height:16px;margin-bottom:6px;}
.link-btn{background:none;border:none;color:var(--secondary);font-weight:600;font-size:var(--fs-sm);padding:0;}

/* ── share pipeline timeline ── */
.pipe{display:flex;flex-direction:column;gap:14px;position:relative;}
.pipe::before{content:"";position:absolute;left:12.5px;top:26px;bottom:26px;width:2px;background:var(--line);}
.stage{display:flex;align-items:center;gap:12px;position:relative;}
.stage .dot{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;flex:none;background:var(--surface-2);color:var(--muted);}
.stage.done .dot{background:var(--green-soft);color:var(--green);}
.stage.active .dot{background:var(--gold-soft);color:var(--gold);}
.stage.fail .dot{background:var(--danger-soft);color:var(--danger);}
.stage .st{flex:1;}
.stage .st b{font-size:var(--fs-sm);}
.stage .st span{display:block;font-size:var(--fs-xs);color:var(--ink-2);}
.stage .tag{border-radius:var(--r-pill);padding:4px 10px;font-size:var(--fs-xs);font-weight:700;background:var(--surface-2);color:var(--muted);}
.stage.done .tag{background:var(--green-soft);color:var(--green);}
.stage.active .tag{background:var(--gold-soft);color:var(--gold);}
.stage.fail .tag{background:var(--danger-soft);color:var(--danger);}
.share-row{display:flex;align-items:center;gap:8px;font-size:var(--fs-xs);padding:8px 0;border-top:1px solid var(--line);}
.share-row .u{color:var(--muted);word-break:break-all;flex:1;}
.rpill{border-radius:var(--r-pill);padding:2px 9px;font-size:10px;font-weight:700;background:var(--surface-2);color:var(--muted);}
.rpill.published{background:var(--green-soft);color:var(--green);}
.rpill.review{background:var(--gold-soft);color:var(--gold);}
.rpill.failed,.rpill.rejected{background:var(--danger-soft);color:var(--danger);}

/* ── states ── */
.skel{border-radius:6px;background:var(--surface-2);background-image:linear-gradient(90deg,transparent,color-mix(in oklab,var(--line-2) 60%,transparent),transparent);background-size:460px 100%;animation:rm-shimmer 1.3s infinite;}
.empty{padding:28px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--ink-2);}
.empty .glyph{width:52px;height:52px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;font-size:22px;color:var(--muted);}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:1600;display:none;
  align-items:center;gap:12px;background:var(--danger-soft);border:1px solid color-mix(in oklab,var(--danger) 30%,transparent);
  border-radius:var(--r-md);padding:12px 14px;box-shadow:var(--sh-2);animation:rm-toast .35s ease;max-width:min(420px,92vw);}
#toast.open{display:flex;}
#toast .bang{width:24px;height:24px;border-radius:50%;background:var(--danger);color:#fff;display:grid;place-items:center;font-weight:800;flex:none;}

/* ── Leaflet chrome restyle ── */
.leaflet-bar{border:1px solid var(--line)!important;border-radius:var(--r-md)!important;box-shadow:var(--sh-2)!important;overflow:hidden;}
.leaflet-bar a{background:var(--surface)!important;color:var(--ink)!important;border-bottom:1px solid var(--line)!important;width:40px!important;height:40px!important;line-height:40px!important;font-size:18px!important;}
.leaflet-bar a:hover{background:var(--surface-2)!important;}
.leaflet-control-attribution{background:color-mix(in oklab,var(--surface) 80%,transparent)!important;color:var(--muted)!important;font-family:var(--font-mono);font-size:9px!important;}
.leaflet-control-attribution a{color:var(--secondary)!important;}
.rm-pin,.rm-cluster{background:none;border:none;}
.rm-tooltip{background:var(--ink)!important;color:var(--surface)!important;border:none!important;box-shadow:var(--sh-2)!important;font-family:var(--font-ui);font-size:12px;font-weight:600;border-radius:6px!important;}
.rm-tooltip::before{display:none;}

@media (max-width:720px){
  #searchWrap{width:calc(100vw - 32px);top:12px;}
  #topRight{top:auto;bottom:calc(38vh + 12px);right:12px;flex-direction:column-reverse;align-items:flex-end;}
  #feedRail{top:auto;left:0;right:0;bottom:0;width:100%;height:38vh;border-radius:22px 22px 0 0;
    backdrop-filter:none;background:var(--surface);}
  #feedRail::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:5px;border-radius:99px;background:var(--line-2);}
  .rail-head{padding-top:20px;}
  #detail{width:100vw;}
}
</style>
</head>
<body>
<div id="map"></div>

<!-- floating search + filters -->
<div id="searchWrap" class="floating">
  <div class="searchbar">
    <div class="mag"></div>
    <input id="searchBox" type="search" data-i18n-ph="search.placeholder" placeholder="Search places, #tags, @creators…" autocomplete="off">
  </div>
  <div class="chips">
    <span class="chip-f" id="chipFollowing" data-i18n="chip.following">Following</span>
    <span class="chip-f" data-i18n="chip.cuisine">Cuisine ▾</span>
    <span class="chip-f">€–€€€€</span>
    <span class="chip-f" data-i18n="chip.openNow">Open now</span>
  </div>
  <div id="searchPanel"></div>
</div>

<!-- top-right account -->
<div id="topRight" class="floating">
  <button class="btn btn-primary" id="shareCta"><span style="font-size:16px;line-height:1">+</span> <span data-i18n="cta.share">Share a link</span></button>
  <button class="btn" id="themeBtn" title="Toggle theme" style="padding:9px 11px"><span id="themeIcon">☾</span></button>
  <button class="btn" id="langBtn" data-i18n-title="lang.title" style="padding:9px 11px"><span id="langLabel">ES</span></button>
  <button class="btn" id="signinCta" data-i18n="cta.signin">Sign in</button>
  <div class="account" id="account" style="display:none">
    <div class="avatar"></div>
    <span id="accountName">@you</span>
    <span style="color:var(--muted);font-size:10px">▾</span>
  </div>
</div>

<!-- feed rail / bottom sheet -->
<div id="feedRail" class="floating">
  <div class="rail-head">
    <span class="serif" id="railTitle" style="font-weight:700;font-size:var(--fs-lg)" data-i18n="rail.recent">Recent shares</span>
    <label class="switch" id="feedFollowingLabel"><input type="checkbox" id="feedFollowing"><span class="track"></span><span data-i18n="chip.following">Following</span></label>
  </div>
  <div class="rail-body" id="feed"></div>
</div>

<!-- drawer -->
<div id="detail"></div>

<!-- auth modal -->
<div class="backdrop" id="authModal">
  <div class="modal">
    <button class="x" data-close="authModal">✕</button>
    <h3 id="authTitle">Welcome back</h3>
    <p class="sub" id="authSub">Sign in to share reels and follow creators.</p>
    <label class="field-label" data-i18n="field.email">Email</label>
    <input class="field" id="email" type="email" placeholder="you@example.com" autocomplete="username">
    <label class="field-label" data-i18n="field.password">Password</label>
    <input class="field" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="err-line" id="authErr"></div>
    <button class="btn btn-primary btn-block" id="authSubmit">Sign in</button>
    <div style="text-align:center;font-size:var(--fs-sm);color:var(--ink-2);margin-top:14px">
      <span id="authSwapText">New here?</span> <button class="link-btn" id="authSwap">Create an account</button>
    </div>
  </div>
</div>

<!-- share modal -->
<div class="backdrop" id="shareModal">
  <div class="modal">
    <button class="x" data-close="shareModal">✕</button>
    <h3 data-i18n="share.title">Share a link</h3>

// and the single quote neutralized so a crafted URL can't break out of the string.

// else the seeded gradient. onerror falls back to the gradient so a dead photo
// URL never shows a broken image. no-referrer keeps the demo origin off Google.

function shortDate(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  const m = (MONTHS[lang] || MONTHS.es)[d.getMonth()];
  return lang === "es" ? `${d.getDate()} ${m} ${d.getFullYear()}` : `${m} ${d.getDate()}, ${d.getFullYear()}`;

async function api(path, opts = {}) {
  const headers = { "Accept":"application/json", "Content-Type":"application/json", ...(opts.headers||{}) };
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, { ...opts, headers });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(body?.error?.message || res.statusText), { body, status: res.status });
  return body;
}

// ── toast ───────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(title, body) {
  document.getElementById("toastTitle").textContent = title;
  document.getElementById("toastBody").textContent = body || "";
  document.getElementById("toast").classList.add("open");
  clearTimeout(toastTimer); toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() { document.getElementById("toast").classList.remove("open"); }

// ── Search (T-031): federated places/tags/influencers ──────────────────────
let searchTimer = null, searchSeq = 0, followTarget = null;
document.getElementById("searchBox").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  const panel = document.getElementById("searchPanel");
  if (q.length < 2) { searchSeq++; panel.classList.remove("open"); panel.innerHTML = ""; return; }
  panel.classList.add("open");
  panel.innerHTML = `<div class="sec-label">SEARCHING…</div>` + skeletonRows(3);
  searchTimer = setTimeout(() => runSearch(q), 250);
});
document.addEventListener("click", (e) => {
  if (!e.target.closest("#searchWrap")) document.getElementById("searchPanel").classList.remove("open");
});

async function runSearch(q) {
  const seq = ++searchSeq;
  const out = document.getElementById("searchPanel");
  try {
    const { data } = await api(`/search?q=${encodeURIComponent(q)}`);
    if (seq !== searchSeq) return;
    const places = (data.places || []).map(p =>
      `<div class="result" onclick="goToPlace(${Number(p.id)}, ${Number(p.lat)}, ${Number(p.lng)})">
         <div class="rt" style="background:${heroGrad(p.name)}"></div>
         <div style="min-width:0;flex:1"><div class="result-name">${esc(p.name)}</div>
           <div class="result-sub">${esc([p.category, price(p.price_range), p.city].filter(Boolean).join(" · "))}</div></div>
       </div>`).join("");
    const tags = (data.tags || []).map(t => `<span class="tagchip">#${esc(t.slug)}${t.places_count!=null?` <span style="opacity:.6">· ${Number(t.places_count)}</span>`:""}</span>`).join("");
    const infl = (data.influencers || []).map(i =>
      `<div class="result"><div class="rt round"></div>
         <div style="min-width:0;flex:1"><div class="result-name" style="font-family:var(--font-ui);font-size:var(--fs-md)">@${esc(i.handle)}</div>
           <div class="result-sub">${t("role.creator")}</div></div></div>`).join("");
    out.innerHTML =
      (places ? `<div class="sec-label">${t("sec.places")}</div>${places}` : "") +
      (tags ? `<div class="sec-label">${t("sec.tags")}</div><div style="padding:0 16px 8px">${tags}</div>` : "") +
      (infl ? `<div class="sec-label">${t("sec.creators")}</div>${infl}` : "") ||
      `<div class="empty"><div class="glyph">?</div><div class="serif" style="font-weight:700;font-size:var(--fs-lg);color:var(--ink)">${t("search.noMatch.title")}</div><div style="font-size:var(--fs-sm)">${t("search.noMatch.body")}</div></div>`;
  } catch (err) {
    if (seq !== searchSeq) return;
    out.innerHTML = `<div class="empty"><div style="color:var(--danger)">${esc(err.message)}</div></div>`;
  }
}

function goToPlace(id, lat, lng) {
  document.getElementById("searchPanel").classList.remove("open");
  map.flyTo([lat, lng], 17, { duration: 0.8 });
  showPlace(id);
}

// ── Feed (T-034): recent published shares ───────────────────────────────────
function skeletonRows(n) {
  let s = "";
  for (let i = 0; i < n; i++) s += `<div class="feed-card" style="cursor:default">
    <div class="skel" style="width:52px;height:70px"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center">
      <div class="skel" style="height:13px;width:70%"></div><div class="skel" style="height:11px;width:50%"></div><div class="skel" style="height:11px;width:40%"></div></div></div>`;
  return s;
}
// T-071: signed-in users see THEIR places (the list twin of the personal map),
// not a global feed. Guests keep the public discovery feed below.
async function loadMyPlaces() {
  const el = document.getElementById("feed");
  el.innerHTML = skeletonRows(3);
  try {
    const { data } = await api(`/me/places?limit=12`);
    if (!data.length) {
      el.innerHTML = `<div class="empty"><div class="glyph">📍</div><div class="serif" style="font-weight:700;color:var(--ink)">Aún no tienes lugares</div><div style="font-size:var(--fs-sm)">Comparte un link o guarda un lugar para empezar tu colección.</div></div>`;
      return;
    }
    el.innerHTML = data.map(place => {
      const g = place.rating && place.rating.google;
      const saved = place.mine && place.mine.saved && !place.mine.share_id
        ? `<span class="rating-chip" style="background:var(--primary-soft);color:var(--primary)">✦ Guardado</span>` : "";
      const img = place.thumbnail_url
        ? `background-image:url('${cssUrl(place.thumbnail_url)}');background-size:cover;background-position:center`
        : `background:${heroGrad(place.name)}`;
      return `<div class="feed-card" onclick="goToPlace(${Number(place.id)}, ${Number(place.lat)}, ${Number(place.lng)})">
        <div class="thumb" style="${img}"></div>
        <div style="min-width:0">
          <div class="feed-name">${esc(place.name || "a place")}</div>
          <div class="feed-foot">
            ${g && g.value!=null ? `<span class="rating-chip">★ ${Number(g.value)}</span>` : ""}
            ${saved}
            <span>${esc([place.category, place.city, price(place.price_range)].filter(Boolean).join(" · "))}</span>
          </div></div></div>`;
    }).join("");
  } catch (err) {
    el.innerHTML = `<div class="empty"><div style="color:var(--danger)">${esc(err.message)}</div></div>`;
  }
}

async function loadFeed() {
  // Signed-in → the personal "my places" list; the Following controls (feed-only)
  // are hidden then, since the map + list are always the viewer's own (T-071).
  const chip = document.getElementById("chipFollowing");
  if (chip) chip.style.display = token ? "none" : "";
  const followLabel = document.getElementById("feedFollowingLabel");
  if (followLabel) followLabel.style.display = token ? "none" : "";
  const railTitle = document.getElementById("railTitle");
  if (railTitle) railTitle.textContent = token ? (lang === "en" ? "My places" : "Mis lugares") : t("rail.recent");
  if (token) return loadMyPlaces();

  const el = document.getElementById("feed");
  const following = document.getElementById("feedFollowing").checked;
  el.innerHTML = skeletonRows(3);
  try {
    const { data } = await api(`/feed?limit=10${following ? "&scope=following" : ""}`);
    if (!data.length) {
      el.innerHTML = `<div class="empty"><div class="glyph">📍</div><div class="serif" style="font-weight:700;color:var(--ink)">${t("feed.empty.title")}</div><div style="font-size:var(--fs-sm)">${t("feed.empty.body")}</div></div>`;
      return;
    }
    el.innerHTML = data.map(item => {
      const place = item.place || {};
      const via = item.sharer
        ? `<a href="#" class="plink" data-u="${esc(item.sharer.username)}" onclick="event.stopPropagation()">@${esc(item.sharer.username)}</a>`
        : "someone";
      const creator = item.influencer ? `@${esc(item.influencer.handle)} <span style="color:var(--muted)">via</span> ` : "";
      const when = item.published_at ? timeAgo(item.published_at) : "";
      const g = place.rating && place.rating.google;
      // Authed viewers can dismiss a share from their own feed (per-user, non-destructive).
      const hide = token ? `<button class="feed-hide" title="Hide from my feed" aria-label="Hide from my feed" onclick="event.stopPropagation();hideFromFeed(${Number(item.id)})">✕</button>` : "";
      return `<div class="feed-card" onclick="goToPlace(${Number(place.id)}, ${Number(place.lat)}, ${Number(place.lng)})">
        ${hide}
        <div class="thumb" style="background:${heroGrad(place.name)}"></div>
        <div style="min-width:0">
          <div class="feed-name">${esc(place.name || "a place")}</div>
          <div class="feed-meta">${creator}${via}</div>
          <div class="feed-foot">
            ${g && g.value!=null ? `<span class="rating-chip">★ ${Number(g.value)}</span>` : ""}
            <span>${esc([place.category, price(place.price_range)].filter(Boolean).join(" · "))}</span>
            <span style="margin-left:auto">${esc(when)}</span>
          </div></div></div>`;
    }).join("");
  } catch (err) {
    el.innerHTML = `<div class="empty"><div style="color:var(--danger)">${esc(err.message)}</div></div>`;
  }
}
// Hide-from-feed (T-059-adjacent): per-user dismiss, mirrors the deleteReview flow.
async function hideFromFeed(shareId) {
  try {
    await api("/feed/hidden", { method: "POST", body: JSON.stringify({ share_id: Number(shareId) }) });
    showToast(t("toast.hidden.title"), t("toast.hidden.body"));
    loadFeed();
  } catch (e) { showToast(t("toast.hideFail"), e.message); }
}
function timeAgo(iso) {
  const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 3600) return Math.floor(s/60) + "m";
  if (s < 86400) return Math.floor(s/3600) + "h";
  if (s < 604800) return Math.floor(s/86400) + "d";
  return new Date(iso).toLocaleDateString();
}

// ── Map: load places in the current viewport ───────────────────────────────
async function loadPlaces() {
  const b = map.getBounds();
  const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].map(n => n.toFixed(6)).join(",");
  try {
    // T-071: the home map is the viewer's OWN places when signed in (shared ∪
    // saved); guests browse the public map.
    const scope = token ? "&filter=mine" : "";
    const { data } = await api(`/map/places?bbox=${bbox}&zoom=${Math.round(map.getZoom())}${scope}`);
    markers.clearLayers();
    for (const p of (data.pins || [])) {
      L.marker([p.lat, p.lng], { icon: pinIcon(p) }).addTo(markers)
        .bindTooltip(esc(p.name), { className:"rm-tooltip", direction:"top", offset:[0,-44] })
        .on("click", () => showPlace(p.id));
    }
    for (const c of (data.clusters || [])) {
      L.marker([c.lat, c.lng], { icon: clusterIcon(c.count) }).addTo(markers)
        .bindTooltip(`${c.count} places`, { className:"rm-tooltip", direction:"top" })
        .on("click", () => { const bb = c.expand?.bbox; if (bb) map.fitBounds([[bb[1],bb[0]],[bb[3],bb[2]]]); });
    }
  } catch (e) { /* map stays as-is on transient errors */ }
}

// Custom MERCADO pins: a Google-style photo bubble (the primary reel's poster
// ringed in terracotta) when the place has imagery, else the terracotta price
// teardrop — with the place name labelled underneath either way so pins don't
// get lost against the map.
function pinIcon(p) {
  // Zoomed out: a lone place is just a dot (density is handled by clusters).
  if (map.getZoom() < 15) {
    const html = `<div style="width:13px;height:13px;border-radius:50%;background:var(--primary);
        border:2px solid #fff;box-shadow:var(--sh-2)"></div>`;
    return L.divIcon({ className:"rm-pin", html, iconSize:[13,13], iconAnchor:[6.5,6.5] });
  }
  const name = `<div style="margin-top:3px;max-width:120px;font-size:10.5px;font-weight:700;letter-spacing:-.2px;color:#2B2320;
      text-align:center;background:rgba(255,255,255,.94);padding:2px 6px;border-radius:6px;box-shadow:var(--sh-1);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>`;
  if (p.thumbnail_url) {
    const html = `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:44px;height:44px;border-radius:50%;border:3px solid var(--primary);box-shadow:var(--sh-2);
          background:#fff center/cover no-repeat;background-image:url('${cssUrl(p.thumbnail_url)}')"></div>
      <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
          border-top:9px solid var(--primary);margin-top:-2px"></div>
      ${name}</div>`;
    return L.divIcon({ className:"rm-pin", html, iconSize:[120,84], iconAnchor:[60,53] });
  }
  const glyph = price(p.price_range) || "•";
  const html = `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:40px;height:40px;border-radius:50% 50% 50% 4px;transform:rotate(45deg);
          background:var(--primary);box-shadow:var(--sh-2);border:2.5px solid #fff;display:grid;place-items:center">
        <span style="transform:rotate(-45deg);color:#fff;font-weight:800;font-size:11px;letter-spacing:-.5px">${esc(glyph)}</span></div>
      ${name}</div>`;
  return L.divIcon({ className:"rm-pin", html, iconSize:[120,70], iconAnchor:[60,40] });
}
function clusterIcon(count) {
  const html = `<div style="position:relative;width:52px;height:52px">
    <div style="position:absolute;inset:-6px;border-radius:50%;background:color-mix(in oklab,var(--primary) 30%,transparent);animation:rm-pulse 2.6s ease-out infinite"></div>
    <div style="width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;border:3px solid #fff;box-shadow:var(--sh-2);position:relative">${count}</div></div>`;
  return L.divIcon({ className:"rm-cluster", html, iconSize:[52,52], iconAnchor:[26,26] });
}

function renderFollowButton(username, viewer) {
  const slot = document.getElementById("followSlot");
  if (!slot || !token || !viewer) return;
  const btn = document.createElement("button");
  btn.className = "btn btn-block" + (viewer.following ? "" : " btn-primary");
  btn.textContent = viewer.following ? t("profile.following") : t("profile.follow");
  btn.addEventListener("click", async () => {
    btn.disabled = true;
    try {
      if (viewer.following) await api(`/follows/${viewer.follow_id}`, { method: "DELETE" });
      else await api("/follows", { method: "POST", body: JSON.stringify(followTarget) });
      showProfile(username);
    } catch (e) { btn.disabled = false; btn.textContent = e.message; }
  });
  slot.replaceChildren(btn);
}

function setAuthMode(mode) {
  authMode = mode;
  document.getElementById("authTitle").textContent = t(mode === "login" ? "auth.title.login" : "auth.title.register");
  document.getElementById("authSub").textContent = t(mode === "login" ? "auth.sub.login" : "auth.sub.register");
  document.getElementById("authSubmit").textContent = t(mode === "login" ? "auth.submit.login" : "auth.submit.register");
  document.getElementById("authSwapText").textContent = t(mode === "login" ? "auth.swaptext.login" : "auth.swaptext.register");
  document.getElementById("authSwap").textContent = t(mode === "login" ? "auth.swap.login" : "auth.swap.register");
}
document.getElementById("authSwap").onclick = () => setAuthMode(authMode === "login" ? "register" : "login");
document.getElementById("authSubmit").onclick = () => auth(authMode);

async function auth(kind) {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const pw = document.getElementById("password");
  document.getElementById("authErr").textContent = "";
  pw.classList.remove("err");
  if (kind === "register" && password.length < 8) {
    document.getElementById("authErr").innerHTML = "⚠ " + esc(t("auth.pwShort"));
    pw.classList.add("err"); return;
  }
  try {
    const stem = (email.split("@")[0] || "user").replace(/[^a-zA-Z0-9_]/g, "").slice(0, 20) || "user";
    const username = (stem.length >= 3 ? stem : "user") + "_" + Math.random().toString(36).slice(2, 7);
    const payload = kind === "register"
      ? { name: stem, username, email, password, device_name: "web-demo" }
      : { email, password, device_name: "web-demo" };
    const body = await api(`/auth/${kind}`, { method:"POST", body: JSON.stringify(payload) });
    token = body?.data?.token || body?.token;
    if (!token) throw new Error("No token in response");
    localStorage.setItem("reelmap_token", token);
    closeModal("authModal");
    await afterAuth();
  } catch (e) {
    const details = e.body?.error?.details;
    const first = details && Object.values(details)[0]?.[0];
    document.getElementById("authErr").innerHTML = "⚠ " + esc(first || e.message);
    pw.classList.add("err");
  }
}

async function afterAuth() {
  let u = null;
  if (token) {
    try { const me = await api("/me"); u = me?.data?.user || me?.data || me; }
    catch { token = null; localStorage.removeItem("reelmap_token"); }
  }
  const on = !!token;
  document.getElementById("signinCta").style.display = on ? "none" : "";
  document.getElementById("account").style.display = on ? "flex" : "none";
  if (on && u) document.getElementById("accountName").textContent = "@" + (u.username || (u.email||"you").split("@")[0]);
  if (on) { refreshShares(); loadPlaces(); }
  loadFeed();
}

let lastFocusedShareId = null;
function focusPublished(shares) {
  const published = shares.find(s => s.status === "published" && s.place);
  if (!published) return;
  loadPlaces();
  if (published.id !== lastFocusedShareId) {
    lastFocusedShareId = published.id;
    map.setView([published.place.lat, published.place.lng], 15);
    setTimeout(() => showToast(t("toast.published"), published.place.name + " " + t("toast.onMap")), 300);
  }
}

function logout() {
  token = null; localStorage.removeItem("reelmap_token"); lastFocusedShareId = null;
  clearInterval(pollTimer); closeModal("shareModal"); afterAuth();
}
document.getElementById("account").onclick = () => { if (confirm(t("misc.logoutConfirm"))) logout(); };

// ── Submit a share + pipeline ────────────────────────────────────────────────
document.getElementById("submitBtn").onclick = submitShare;
async function submitShare() {
  const url = document.getElementById("url").value.trim();
  const caption = document.getElementById("caption").value.trim();
  const btn = document.getElementById("submitBtn");
  document.getElementById("submitErr").textContent = "";
  if (!url && !caption) { document.getElementById("submitErr").innerHTML = "⚠ " + esc(t("share.needInput")); return; }
  btn.disabled = true; btn.textContent = t("share.submitting");
  try {
    await api("/shares", { method:"POST", body: JSON.stringify({ url: url || undefined, caption: caption || undefined }) });
    document.getElementById("url").value = ""; document.getElementById("caption").value = "";
    document.getElementById("shareTracker").style.display = "block";
    startPolling();
  } catch (e) { document.getElementById("submitErr").innerHTML = "⚠ " + esc(e.body?.error?.message || e.message); }
  finally { btn.disabled = false; btn.textContent = t("share.submit"); }
}

// Map a live share status onto the 4-stage MERCADO timeline.
const STAGES = [
  { key:"pipe.queued", sub:"pipe.queuedSub", reached:["pending","fetching","analyzing","review","published"] },
  { key:"pipe.analyzing", sub:"pipe.analyzingSub", reached:["analyzing","review","published"], active:["fetching","analyzing"] },
  { key:"pipe.review", sub:"pipe.reviewSub", reached:["review","published"], active:["review"] },
  { key:"pipe.published", sub:"pipe.publishedSub", reached:["published"], active:[] },
];
function pipelineHtml(status) {
  const failed = status === "failed" || status === "rejected";
  const rows = STAGES.map((s, i) => {
    let cls = "wait", icon = "○", tag = t("pipe.queued");
    if (s.reached.includes(status) && !(s.active||[]).includes(status)) { cls = "done"; icon = "✓"; tag = t("pipe.done"); }
    if ((s.active||[]).includes(status) || (i === 1 && status === "pending")) { cls = "active"; icon = "◐"; tag = t("pipe.working"); }
    if (failed && !s.reached.includes(status)) { cls = "wait"; }
    return `<div class="stage ${cls}"><div class="dot">${icon}</div>
      <div class="st"><b>${t(s.key)}</b><span>${t(s.sub)}</span></div><span class="tag">${tag}</span></div>`;
  }).join("");
  const failRow = failed ? `<div class="stage fail"><div class="dot">✕</div>
    <div class="st"><b>${t("pipe.failTitle")}</b><span>${t("pipe.failBody")}</span></div><span class="tag">${t("pipe.failed")}</span></div>` : "";
  return `<div class="pipe">${rows}${failRow}</div>`;
}

async function refreshShares() {
  try {
    const { data } = await api("/shares?limit=8");
    const el = document.getElementById("shares");
    if (!data.length) { el.innerHTML = '<div style="font-size:var(--fs-sm);color:var(--ink-2)">Nothing yet — paste a link above.</div>'; return; }
    const active = data.find(s => ["pending","fetching","analyzing","review"].includes(s.status));
    const failed = data.find(s => ["failed","rejected"].includes(s.status));
    const track = active || failed;
    el.innerHTML =
      (track ? pipelineHtml(track.status) + '<div style="height:14px"></div>' : "") +
      data.map(s => {
        const st = s.status;
        const place = s.place ? ` · 📍 ${esc(s.place.name)}` : "";
        return `<div class="share-row"><span class="rpill ${esc(st)}">${esc(st)}</span>
          <span class="u">${esc(s.url||s.source_post?.url||"caption")}${place}</span></div>`;
      }).join("");
    focusPublished(data);
    const inflight = data.some(s => ["pending","fetching","analyzing"].includes(s.status));
    if (!inflight && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } catch { /* keep last render */ }
}
function startPolling() { refreshShares(); clearInterval(pollTimer); pollTimer = setInterval(refreshShares, 2500); }

// ── boot ─────────────────────────────────────────────────────────────────────
setAuthMode("login");   // localize the auth modal copy on first paint
afterAuth();
</script>
</body>
</html>
